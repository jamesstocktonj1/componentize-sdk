name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  packages: write

jobs:
  tag:
    name: Tag Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.compute.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute new version
        id: compute
        run: |
          CURRENT=$(git tag -l --sort=-version:refname 'v*.*.*' | head -1)
          CURRENT=${CURRENT:-v0.0.0}
          NEW=$(npx --yes semver -i ${{ inputs.bump }} ${CURRENT#v})
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Create tags
        run: |
          git tag "${{ steps.compute.outputs.tag }}"
          git tag "p3/${{ steps.compute.outputs.tag }}"
          git push origin "${{ steps.compute.outputs.tag }}" "p3/${{ steps.compute.outputs.tag }}"

  build-examples:
    name: Build Root Example - ${{ matrix.function }}
    runs-on: ubuntu-latest
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        function:
          - hello
          - client
          - blobby
          - socket-client
          - socket-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install wash
        uses: wasmCloud/setup-wash-action@main
        with:
          wash-version: v2.5.1
      - name: Install componentize-go
        uses: bytecodealliance/componentize-go/.github/actions/setup-componentize-go@main
        with:
          version: canary
      - name: Run Build
        working-directory: examples/${{ matrix.function }}
        run: make build
      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Publish artifact
        working-directory: examples/${{ matrix.function }}
        run: |
          wash oci push ghcr.io/${{ github.repository }}/${{ matrix.function }}:${{ needs.tag.outputs.version }} build/${{ matrix.function }}.wasm

  build-p3-examples:
    name: Build p3 Example - ${{ matrix.function }}
    runs-on: ubuntu-latest
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        function:
          - hello-p3
          - client-p3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install wash
        uses: wasmCloud/setup-wash-action@main
        with:
          wash-version: v2.5.1
      - name: Install componentize-go
        uses: bytecodealliance/componentize-go/.github/actions/setup-componentize-go@main
        with:
          version: canary
      - name: Run Build
        working-directory: examples/${{ matrix.function }}
        run: make build
      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Publish artifact
        working-directory: examples/${{ matrix.function }}
        run: |
          wash oci push ghcr.io/${{ github.repository }}/${{ matrix.function }}:${{ needs.tag.outputs.version }} build/${{ matrix.function }}.wasm

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [tag, build-examples, build-p3-examples]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.tag.outputs.version }}" --generate-notes
