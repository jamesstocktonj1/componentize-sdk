name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string

permissions:
  packages: write

jobs:
  tag:
    name: Tag Root Module
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create root tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

  tag-p3:
    name: Tag p3 Submodule
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create p3 tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag "p3/${{ inputs.version }}"
          git push origin "p3/${{ inputs.version }}"

  build-examples:
    name: Build Root Example - ${{ matrix.function }}
    runs-on: ubuntu-latest
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        function:
          - hello
          - client
          - blobby
          - socket-client
          - socket-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install wash
        uses: wasmCloud/setup-wash-action@main
        with:
          wash-version: wash-v2.0.0-rc.8
      - name: Install componentize-go
        uses: bytecodealliance/componentize-go/.github/actions/setup-componentize-go@main
        with:
          version: canary
      - name: Run Build
        working-directory: examples/${{ matrix.function }}
        run: make build
      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Publish artifact
        working-directory: examples/${{ matrix.function }}
        run: |
          wash oci push ghcr.io/${{ github.repository }}/${{ matrix.function }}:${{ inputs.version }} build/${{ matrix.function }}.wasm

  build-p3-examples:
    name: Build p3 Example - ${{ matrix.function }}
    runs-on: ubuntu-latest
    needs: tag-p3
    strategy:
      fail-fast: false
      matrix:
        function:
          - hello-p3
          - client-p3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install wash
        uses: wasmCloud/setup-wash-action@main
        with:
          wash-version: wash-v2.0.0-rc.8
      - name: Install componentize-go
        uses: bytecodealliance/componentize-go/.github/actions/setup-componentize-go@main
        with:
          version: canary
      - name: Run Build
        working-directory: examples/${{ matrix.function }}
        run: make build
      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Publish artifact
        working-directory: examples/${{ matrix.function }}
        run: |
          wash oci push ghcr.io/${{ github.repository }}/${{ matrix.function }}:${{ inputs.version }} build/${{ matrix.function }}.wasm

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-examples, build-p3-examples]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.version }}" --generate-notes
