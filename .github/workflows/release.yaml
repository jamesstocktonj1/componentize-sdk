name: Release Workflow

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  packages: write

jobs:
  build-examples:
    name: Build Example - ${{ matrix.function }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function:
          - hello
          - client
          - blobby
          - socket-client
          - socket-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install wash
        uses: wasmCloud/setup-wash-action@main
        with:
          wash-version: wash-v2.0.0-rc.8
      - name: Install componentize-go
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: componentize-go
          git: https://github.com/bytecodealliance/componentize-go
          tag: canary
      - name: Run Build
        working-directory: examples/${{ matrix.function }}
        run: make build
      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Publish artifact
        working-directory: examples/${{ matrix.function }}
        run: |
          tag=$(echo "${{ github.ref_name }}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' && echo "${{ github.ref_name }}" || echo "canary")
          wash oci push ghcr.io/${{ github.repository }}/${{ matrix.function }}:${tag} build/${{ matrix.function }}.wasm

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-examples
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" --generate-notes
