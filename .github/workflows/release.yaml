name: Release Workflow

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  packages: write

jobs:
  build-examples:
    name: Build Example - ${{ matrix.function }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function:
          - hello
          - client
          - blobby
          - socket-client
          - socket-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install wash
        uses: wasmCloud/setup-wash-action@main
        with:
          wash-version: wash-v2.0.0-rc.8
      - name: Install componentize-go
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: componentize-go
          git: https://github.com/bytecodealliance/componentize-go
          tag: canary
      - name: Run Build
        working-directory: examples/${{ matrix.function }}
        run: make build
      - name: Publish artifact
        uses: wasmcloud/actions/wash-oci-publish@main
        with:
          component_path: examples/${{ matrix.function }}/build/${{ matrix.function }}.wasm
          image_tags: ${{ github.ref_name }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-examples
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/*.wasm \
            --generate-notes
