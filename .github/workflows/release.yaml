name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  packages: write

jobs:
  tag:
    name: Tag Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine next version
        id: bump
        run: |
          git fetch --tags --force
          latest=$(git tag -l | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | sed 's/^v//' | sort -V | tail -n1)
          if [ -z "$latest" ]; then
            latest="0.0.0"
          fi

          IFS='.' read -r major minor patch <<< "$latest"
          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac
          version="${major}.${minor}.${patch}"

          echo "Bumping ${latest} -> ${version} (${{ inputs.bump }})"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Create tags
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag "${{ steps.bump.outputs.version }}"
          git tag "p3/${{ steps.bump.outputs.version }}"
          git push origin "${{ steps.bump.outputs.version }}" "p3/${{ steps.bump.outputs.version }}"

  build-examples:
    name: Build Root Example - ${{ matrix.function }}
    runs-on: ubuntu-latest
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        function:
          - hello
          - client
          - blobby
          - socket-client
          - socket-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install wash
        uses: wasmCloud/setup-wash-action@main
        with:
          wash-version: v2.5.1
      - name: Install componentize-go
        uses: bytecodealliance/componentize-go/.github/actions/setup-componentize-go@main
        with:
          version: canary
      - name: Run Build
        working-directory: examples/${{ matrix.function }}
        run: make build
      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Publish artifact
        working-directory: examples/${{ matrix.function }}
        run: |
          wash oci push ghcr.io/${{ github.repository }}/${{ matrix.function }}:${{ needs.tag.outputs.version }} build/${{ matrix.function }}.wasm

  build-p3-examples:
    name: Build p3 Example - ${{ matrix.function }}
    runs-on: ubuntu-latest
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        function:
          - hello-p3
          - client-p3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install wash
        uses: wasmCloud/setup-wash-action@main
        with:
          wash-version: v2.5.1
      - name: Install componentize-go
        uses: bytecodealliance/componentize-go/.github/actions/setup-componentize-go@main
        with:
          version: canary
      - name: Run Build
        working-directory: examples/${{ matrix.function }}
        run: make build
      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Publish artifact
        working-directory: examples/${{ matrix.function }}
        run: |
          wash oci push ghcr.io/${{ github.repository }}/${{ matrix.function }}:${{ needs.tag.outputs.version }} build/${{ matrix.function }}.wasm

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [tag, build-examples, build-p3-examples]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.tag.outputs.version }}" --generate-notes
